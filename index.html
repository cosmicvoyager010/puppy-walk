<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>// SOVEREIGN WALKER // FLUID GLASS</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f0f10 0%, #1a1a2e 100%); 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { 
            max-width: 600px; width: 90%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        button { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 10px 15px; border-radius: 10px;
            cursor: pointer; margin: 5px; transition: 0.3s;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div id="container" class="container">
        <h1>// OMNI-WALKER</h1>
        <div id="controls">
            <button onclick="setTimeline('ancient')">ANCIENT</button>
            <button onclick="setTimeline('modern')">MODERN</button>
            <button onclick="setTimeline('future')">FUTURE</button>
            <button onclick="setTimeline('cosmic')">COSMIC</button>
        </div>
        <div id="display" style="margin-top:20px;"></div>
        <button onclick="addSteps()" style="margin-top:20px;">+500 STEPS</button>
        <p id="stats">TOTAL STEPS: 0</p>
    </div>

    <script>
        const data = {
            ancient: { title: "Ancient", desc: "Monemvasia Fortress", puppy: "🏛️ Puppy sniffing ancient stones." },
            modern: { title: "Modern", desc: "Nairobi Tech Grid", puppy: "🏙️ Puppy trots near electric lines." },
            future: { title: "Future", desc: "Artemis Lunar Base", puppy: "🚀 Puppy in a tiny EVA suit." },
            cosmic: { title: "Cosmic", desc: "Voyager 1 Path", puppy: "🌌 Puppy floating in zero-g." }
        };
        let active = 'modern';
        let totalSteps = 0;

        function setTimeline(t) {
            active = t;
            update();
        }

        function addSteps() {
            totalSteps += 500;
            document.getElementById('stats').innerText = `TOTAL STEPS: ${totalSteps}`;
            update();
        }

        function update() {
            const d = data[active];
            const emoji = active === 'ancient' ? '🏛️' : active === 'modern' ? '🏙️' : active === 'future' ? '🚀' : '🌌';
            document.getElementById('display').innerHTML = `<h2>${emoji} ${d.title}</h2><p>${d.desc}</p><p>${d.puppy}</p>`;
        }
        update();
    </script>
</body>
</html>
