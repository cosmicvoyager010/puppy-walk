<style>
    /* Brutalist Base */
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; transition: 0.5s; }
    .container { max-width: 600px; margin: auto; border: 1px solid #fff; padding: 20px; }
    
    /* Dynamic Theme Hooks */
    .theme-ancient { border-color: #d4af37; color: #d4af37; }
    .theme-modern { border-color: #00ff66; color: #00ff66; }
    .theme-future { border-color: #00ccff; color: #00ccff; }
    .theme-cosmic { border-color: #cc33ff; color: #cc33ff; }
    
    button { background: #000; border: 1px solid currentColor; color: currentColor; padding: 10px; cursor: pointer; }
    .active { background: currentColor; color: #000; }
</style>

<script>
    function setTimeline(t) {
        active = t;
        // Reset and Apply Theme
        document.body.className = 'theme-' + t;
        document.getElementById('container').className = 'container theme-' + t;
        update();
    }
    
    // Update the display function to show the Emoji Anchor
    function update() {
        const d = data[active];
        const emoji = active === 'ancient' ? '🏛️' : active === 'modern' ? '🏙️' : active === 'future' ? '🚀' : '🌌';
        document.getElementById('display').innerHTML = `
            <h2>${emoji} ${d.title}</h2>
            <p>${d.desc}</p>
            <p>${d.puppy}</p>
        `;
    }
</script>
