<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Puppy Walk</title>

  <!-- Apple Standalone App Configuration & Camouflage Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Puppy%20Walk%22,%22short_name%22:%22Puppy%20Walk%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23ffffff%22}">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐶</text></svg>">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtle: #86868b;
      --border: #f2f2f7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(30px + env(safe-area-inset-top)) 24px calc(30px + env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tracker-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtle);
      font-weight: 600;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #ff9500;
      border-radius: 50%;
      transition: background-color 0.3s ease;
    }

    .status-dot.active { background-color: #34c759; }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 35px;
    }

    .metric-group { text-align: center; }
    
    .tracker-value {
      font-size: 6rem;
      font-weight: 200;
      letter-spacing: -3px;
      line-height: 1;
    }

    .puppy-stage {
      height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }

    .puppy-avatar {
      font-size: 5.5rem;
      transition: transform 0.2s ease;
    }

    .puppy-status-text {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--subtle);
      text-align: center;
      max-width: 80%;
      line-height: 1.4;
    }

    .storage-drawer {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .db-msg {
      font-size: 0.75rem;
      color: var(--subtle);
    }

    .btn-action-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .drawer-btn {
      flex: 1;
      background: #f2f2f7;
      border: none;
      color: var(--text);
      padding: 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .drawer-btn.primary {
      background: var(--text);
      color: var(--bg);
    }

    .pulse-slow { animation: idleBounce 1.6s infinite ease-in-out alternate; }
    .pulse-fast { animation: activeStride 0.5s infinite ease-in-out alternate; }

    @keyframes idleBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }
    @keyframes activeStride {
      0% { transform: scale(1) rotate(-3deg); }
      100% { transform: scale(1.05) rotate(3deg); }
    }
  </style>
</head>
<body>

  <header>
    <div class="tracker-label">Puppy Walk</div>
    <div class="status-container">
      <span class="tracker-label" id="status-text">Standby</span>
      <div class="status-dot" id="status-indicator"></div>
    </div>
  </header>

  <main>
    <div class="metric-group">
      <div class="tracker-value" id="step-display">0000</div>
      <div class="tracker-label" style="margin-top: 8px;">Total Steps Ever Taken</div>
    </div>
    
    <div class="puppy-stage">
      <div class="puppy-avatar pulse-slow" id="puppy-model">🐶</div>
      <div class="puppy-status-text" id="puppy-behavior">Tap screen once to link iPhone motion hardware...</div>
    </div>
  </main>

  <footer class="storage-drawer">
    <div class="db-msg" id="vault-status">🔒 Local Vault Location: Device Partition Active</div>
    
    <div class="btn-action-row">
      <button class="drawer-btn" onclick="triggerManualBackup()">Export Data Log</button>
      <button class="drawer-btn primary" onclick="simulateStepDebug()">Test Step Manually</button>
    </div>
  </footer>

  <script>
    let totalSteps = 0;
    let sessionSteps = 0; 
    let walkSessionActive = false;
    let walkTimeout;
    let databaseInstance;

    const stepDisplay = document.getElementById('step-display');
    const puppyModel = document.getElementById('puppy-model');
    const puppyBehavior = document.getElementById('puppy-behavior');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const vaultStatus = document.getElementById('vault-status');

    // --- INDEXEDDB STORAGE PROTOCOL ---
    const openRequest = indexedDB.open("SovereignPuppyVault", 1);

    openRequest.onupgradeneeded = (event) => {
      let db = event.target.result;
      db.createObjectStore("session_logs", { keyPath: "metricId" });
    };

    openRequest.onsuccess = (event) => {
      databaseInstance = event.target.result;
      hydrateAppFromStorage();
    };

    openRequest.onerror = () => {
      vaultStatus.innerText = "⚠️ Hardware Vault Locked. Using live session backup.";
    };

    function hydrateAppFromStorage() {
      if (!databaseInstance) return;
      const tx = databaseInstance.transaction(["session_logs"], "readonly");
      const store = tx.objectStore("session_logs");
      const query = store.get("cumulative_steps");

      query.onsuccess = () => {
        if (query.result) {
          totalSteps = query.result.stepCount;
          refreshDisplayMetrics();
          puppyBehavior.innerText = "Data verified. Ready to walk when you are!";
        } else {
          commitToDeviceVault(0);
        }
      };
    }

    function commitToDeviceVault(value) {
      if (!databaseInstance) return;
      const tx = databaseInstance.transaction(["session_logs"], "readwrite");
      const store = tx.objectStore("session_logs");
      store.put({ metricId: "cumulative_steps", stepCount: value, lastUpdated: Date.now() });
      
      tx.oncomplete = () => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        vaultStatus.innerText = `🔒 Hard-Saved to iPhone Storage (${timestamp})`;
      };
    }

    // --- AUTOMATED ACCELEROMETER HARDWARE HANDSHAKE ---
    function enableHardwareTracking() {
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(permission => {
            if (permission === 'granted') {
              window.addEventListener('devicemotion', processKineticForces);
              puppyBehavior.innerText = "iPhone sensors linked! Start walking.";
            }
          })
          .catch(() => { puppyBehavior.innerText = "Sensor handshake rejected."; });
      } else {
        window.addEventListener('devicemotion', processKineticForces);
      }
    }

    let lastVectors = { x: 0, y: 0, z: 0 };
    const motionSensitivityThreshold = 12.0; 

    function processKineticForces(event) {
      let forces = event.accelerationIncludingGravity;
      if (!forces) return;

      let deltaForce = Math.abs(forces.x - lastVectors.x) + 
                       Math.abs(forces.y - lastVectors.y) + 
                       Math.abs(forces.z - lastVectors.z);

      if (deltaForce > motionSensitivityThreshold) {
        executeStepIncrement();
      }

      lastVectors = { x: forces.x, y: forces.y, z: forces.z };
    }

    function executeStepIncrement() {
      totalSteps += 1;
      sessionSteps += 1;
      refreshDisplayMetrics();
      manageMovementStates();
      evaluatePuppyEmotions();
      commitToDeviceVault(totalSteps);
    }

    function simulateStepDebug() {
      executeStepIncrement();
    }

    function refreshDisplayMetrics() {
      stepDisplay.innerText = String(totalSteps).padStart(4, '0');
    }

    function manageMovementStates() {
      if (!walkSessionActive) {
        walkSessionActive = true;
        statusIndicator.classList.add('active');
        statusText.innerText = "Walking";
      }

      clearTimeout(walkTimeout);
      
      // KINETIC AUTO-STOP: Auto-logs walk after 30 seconds of stillness
      walkTimeout = setTimeout(() => {
        walkSessionActive = false;
        statusIndicator.classList.remove('active');
        statusText.innerText = "Standby";
        puppyModel.className = "puppy-avatar pulse-slow";
        puppyModel.innerText = "🐶";
        
        puppyBehavior.innerHTML = `Walk completed automatically!<br><span style="color:var(--text); font-weight:600;">+${sessionSteps} steps logged</span> during this stretch.`;
        
        sessionSteps = 0;
      }, 30000);
    }

    function evaluatePuppyEmotions() {
      if (sessionSteps > 0 && sessionSteps < 20) {
        puppyModel.innerText = "🐕";
        puppyModel.className = "puppy-avatar pulse-slow";
        puppyBehavior.innerText = "Sniffing the grass, tail wagging!";
      } else if (sessionSteps >= 20 && sessionSteps < 100) {
        puppyModel.innerText = "🦮";
        puppyModel.className = "puppy-avatar pulse-fast";
        puppyBehavior.innerText = "Pure puppy bliss! Trotting perfectly by your side.";
      } else if (sessionSteps >= 100) {
        puppyModel.innerText = "🐕‍🦺";
        puppyModel.className = "puppy-avatar pulse-fast";
        puppyBehavior.innerText = "Unstoppable joy! Absolute peak energy achieved! 🌟";
      }
    }

    function triggerManualBackup() {
      const dataPackage = {
        application: "PuppyWalk",
        version: "2026.2",
        metrics: { totalCalculatedSteps: totalSteps },
        deviceBackupTimestamp: new Date().toISOString()
      };

      const convertedString = JSON.stringify(dataPackage, null, 2);
      const textBlob = new Blob([convertedString], { type: "text/plain" });
      const temporaryUrl = URL.createObjectURL(textBlob);

      const downloadTrigger = document.createElement('a');
      downloadTrigger.href = temporaryUrl;
      downloadTrigger.download = `puppy_walk_log.txt`;
      document.body.appendChild(downloadTrigger);
      downloadTrigger.click();
      document.body.removeChild(downloadTrigger);
      URL.revokeObjectURL(temporaryUrl);
    }

    window.addEventListener('click', () => { enableHardwareTracking(); });
  </script>
</body>
</html>
